<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experience - Anu Benoy</title>
    <link rel="stylesheet" href="exp.css">
</head>
<body>

    <!-- Main Container with 3 Columns -->
    <section class="main-container">
        <!-- Left Column - Experience Details -->
        <div class="details-column left-column">
            <div class="experience-details" id="leftDetails">
                <h3 class="details-title"></h3>
                <p class="details-company"></p>
                <p class="details-duration"></p>
                <p class="details-description"></p>
            </div>
        </div>

        <!-- Middle Column - Experience Circle -->
        <div class="circle-column">
            <section class="experience-circle-section">
                <div class="experience-circle" id="experienceCircle">
                    <div class="inner-circle"></div>
                    <span class="circle-text">5 + yrs</span>
                </div>
            </section>
        </div>

        <!-- Right Column - Experience Details -->
        <div class="details-column right-column">
            <div class="experience-details" id="rightDetails">
                <h3 class="details-title"></h3>
                <p class="details-company"></p>
                <p class="details-duration"></p>
                <p class="details-description"></p>
            </div>
        </div>
    </section>

    <!-- Carousel Dots -->
    <div class="carousel-dots" id="carouselDots"></div>

    <script src="exp.js"></script>
</body>
</html>
